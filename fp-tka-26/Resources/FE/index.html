<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Processing Service</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 Order Processing Service</h1>
      <p class="subtitle">Final Project Teknologi Komputasi Awan</p>
    </header>

    <!-- Auth Section -->
    <section id="auth-section" class="card">
      <h2>Autentikasi</h2>
      <div class="auth-forms">
        <!-- Login Form -->
        <div class="auth-form">
          <h3>Login</h3>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="email@example.com" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" />
          </div>
          <button onclick="login()">Login</button>
        </div>

        <!-- Register Form -->
        <div class="auth-form">
          <h3>Register</h3>
          <div class="form-group">
            <label for="reg-name">Nama</label>
            <input type="text" id="reg-name" placeholder="Nama Anda" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="email@example.com" />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" />
          </div>
          <button onclick="register()">Register</button>
        </div>
      </div>
      <div id="auth-result" class="result-box hidden"></div>
    </section>

    <!-- Main Content Section -->
    <section id="main-section" class="hidden">
      <!-- User Info bar -->
      <div class="user-bar card" style="display: flex; justify-content: space-between; align-items: center;">
        <span id="user-info">Logged in as: -</span>
        <button onclick="logout()" style="background-color: #ff4d4f; width: auto; margin-top: 0;">Logout</button>
      </div>

      <!-- Form Buat Pesanan -->
      <section class="card">
        <h2>Buat Pesanan Baru</h2>
        <div class="form-group">
          <label for="product-select">Produk</label>
          <select id="product-select">
            <option value="">-- Pilih Produk --</option>
            <!-- Diisi oleh api.js -->
          </select>
        </div>
        <div class="form-group">
          <label for="quantity">Jumlah</label>
          <input type="number" id="quantity" min="1" value="1" />
        </div>
        <button onclick="createOrder()">Buat Pesanan</button>
        <div id="create-result" class="result-box hidden"></div>
      </section>

      <!-- Cek Status Pesanan -->
      <section class="card">
        <h2>Cek Status Pesanan</h2>
        <div class="form-group">
          <label for="order-id">Order ID</label>
          <input type="text" id="order-id" placeholder="Masukkan order_id" />
        </div>
        <button onclick="getOrderStatus()">Cek Status</button>
        <div id="status-result" class="result-box hidden"></div>
      </section>

      <!-- Riwayat Pesanan -->
      <section class="card">
        <h2>Riwayat Pesanan</h2>
        <button onclick="getOrderHistory()">Tampilkan Riwayat</button>
        <div id="history-result" class="result-box hidden"></div>
      </section>

      <!-- Update Status (Admin Only) -->
      <section id="admin-section" class="card hidden">
        <h2>Update Status Pesanan (Admin)</h2>
        <div class="form-group">
          <label for="update-order-id">Order ID</label>
          <input type="text" id="update-order-id" placeholder="Masukkan order_id" />
        </div>
        <div class="form-group">
          <label for="new-status">Status Baru</label>
          <select id="new-status">
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <button onclick="updateOrderStatus()">Update Status</button>
        <div id="update-result" class="result-box hidden"></div>
      </section>
    </section>

  </div>

  <script src="api.js"></script>
</body>
</html>
